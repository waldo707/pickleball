<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e88e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 28px;
      text-align: center;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
      margin-top: 8px;
    }

    button {
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 12px;
    }

    .section {
      margin-top: 16px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .court {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8px;
    }

    .team {
      font-size: 20px;
      text-align: center;
      margin: 6px 0;
    }

    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 8px 0;
    }

    .sitout {
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>

<body>
  <h1>Pickleball Scheduler</h1>

  <div class="section">
    <label>Player Names (comma separated)</label>
    <input id="playersInput" placeholder="Alex, Sam, Jordan, Riley">
  </div>

  <div class="section">
    <label>Number of Courts</label>
    <input type="number" id="courtsInput" value="1" min="1" max="8">
  </div>

  <div class="section">
    <button onclick="start()">Generate First Round</button>
  </div>

<div class="section">
  <div id="timerDisplay" style="
    font-size: 48px;
    text-align: center;
    font-weight: bold;
    margin-top: 12px;
  ">
    08:00
  </div>

  <button onclick="startTimer()">Start Match Timer</button>
</div>

  <div class="section" id="output"></div>

  <div class="section">
    <button onclick="nextRound()">Next Round</button>
  </div>

<script>
/* ===================== STATE ===================== */
let players = [];
let courts = 1;
let playCount = {};
let usedPartners = new Set();

let currentRound = null;
let nextRoundData = null;

// ===================== TIMER STATE =====================
let timerSeconds = 8 * 60;   // 8 minutes
let timerInterval = null;

/* ===================== HELPERS ===================== */
function key(a, b) {
  return [a, b].sort().join("|");
}

/* ===================== ROUND GENERATION ===================== */
function generateRound() {
  let grouped = {};
  players.forEach(p => {
    let count = playCount[p];
    if (!grouped[count]) grouped[count] = [];
    grouped[count].push(p);
  });

  let available = [];
  Object.keys(grouped)
    .sort((a, b) => a - b)
    .forEach(k => {
      available.push(...grouped[k].sort(() => Math.random() - 0.5));
    });

  let matches = [];

  for (let i = 1; i <= courts; i++) {
    if (available.length < 4) break;

    let group = available.splice(0, 4);

    let combos = [
      [[group[0], group[1]], [group[2], group[3]]],
      [[group[0], group[2]], [group[1], group[3]]],
      [[group[0], group[3]], [group[1], group[2]]]
    ].sort(() => Math.random() - 0.5);

    let chosen = combos.find(c =>
      !usedPartners.has(key(c[0][0], c[0][1])) &&
      !usedPartners.has(key(c[1][0], c[1][1]))
    ) || combos[0];

    usedPartners.add(key(chosen[0][0], chosen[0][1]));
    usedPartners.add(key(chosen[1][0], chosen[1][1]));

    chosen[0].forEach(p => playCount[p]++);
    chosen[1].forEach(p => playCount[p]++);

    matches.push({
      court: i,
      teamA: chosen[0],
      teamB: chosen[1]
    });
  }

  return {
    matches: matches,
    sitouts: available
  };
}

/* ===================== START / ADVANCE ===================== */
function start() {
resetTimer();  
players = document.getElementById("playersInput").value
    .split(",")
    .map(p => p.trim())
    .filter(Boolean);

  courts = parseInt(document.getElementById("courtsInput").value);

  playCount = {};
  usedPartners.clear();
  players.forEach(p => playCount[p] = 0);

  currentRound = generateRound();
  nextRoundData = generateRound();

  render();
}

function nextRound() {
 resetTimer(); 
 currentRound = nextRoundData;
  nextRoundData = generateRound();
  render();
}

/* ===================== RENDERING ===================== */
function renderRound(title, round) {
  if (!round) return "";

  let html = `<h2>${title}</h2>`;

  round.matches.forEach(m => {
    html += `
      <div class="card">
        <div class="court">COURT ${m.court}</div>
        <div class="team">${m.teamA[0]} & ${m.teamA[1]}</div>
        <hr>
        <div class="team">${m.teamB[0]} & ${m.teamB[1]}</div>
      </div>`;
  });

  if (round.sitouts.length) {
    html += `
      <div class="card sitout">
        Sitting out:<br>${round.sitouts.join(", ")}
      </div>`;
  }

  return html;
}

function render() {
  let html = "";
  html += renderRound("CURRENT ROUND", currentRound);
  html += renderRound("NEXT MATCH (COMING UP)", nextRoundData);
  document.getElementById("output").innerHTML = html;
}

// ===================== TIMER FUNCTIONS =====================
function updateTimerDisplay() {
  let minutes = Math.floor(timerSeconds / 60);
  let seconds = timerSeconds % 60;

  document.getElementById("timerDisplay").innerText =
    `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function playAlarm() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = ctx.createOscillator();
  const gain = ctx.createGain();

  oscillator.type = "sine";
  oscillator.frequency.setValueAtTime(880, ctx.currentTime);
  gain.gain.setValueAtTime(0.7, ctx.currentTime);

  oscillator.connect(gain);
  gain.connect(ctx.destination);

  oscillator.start();
  oscillator.stop(ctx.currentTime + 1.5);
}

function startTimer() {
  if (timerInterval) return;

  timerInterval = setInterval(() => {
    if (timerSeconds > 0) {
      timerSeconds--;
      updateTimerDisplay();
    } else {
      clearInterval(timerInterval);
      timerInterval = null;
      document.getElementById("timerDisplay").style.color = "red";
      playAlarm();
    }
  }, 1000);
}

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = 8 * 60;
  document.getElementById("timerDisplay").style.color = "black";
  updateTimerDisplay();
}

</script>
</body>
</html>
