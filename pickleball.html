<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pickleball Scheduler</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1e88e5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    h2 {
      margin-top: 28px;
      text-align: center;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      width: 100%;
      margin-top: 8px;
    }

    button {
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 12px;
      margin-top: 12px;
    }

    .section {
      margin-top: 16px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-top: 12px;
    }

    .court {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 8px;
    }

    .team {
      font-size: 20px;
      text-align: center;
      margin: 6px 0;
    }

    .sitout {
      font-size: 18px;
      text-align: center;
      margin-top: 12px;
    }

    hr {
      border: none;
      border-top: 1px solid #ccc;
      margin: 8px 0;
    }
  </style>
</head>

<body>
  <h1>Pickleball Scheduler</h1>

  <div class="section">
    <label>Player Names (comma separated)</label>
    <input id="playersInput" placeholder="Alex, Sam, Jordan, Riley">
  </div>

  <div class="section">
    <label>Number of Courts</label>
    <input type="number" id="courtsInput" value="1" min="1" max="8">
  </div>

  <div class="section">
    <button onclick="start()">Generate First Round</button>
  </div>

  <div class="section" id="output"></div>

  <div class="section">
    <button onclick="nextRound()">Next Round</button>
  </div>

<script>
// ===================== STATE =====================
let players = [];
let courts = 1;
let playCount = {};
let usedPartners = new Set();

let currentRound = null;
let nextRoundData = null;

// ===================== HELPERS =====================
function key(a, b) {
  return [a, b].sort().join("|");
}

// ===================== ROUND GENERATION =====================
function generateRound() {
  let grouped = {};

  players.forEach(p => {
    let count = playCount[p];
    if (!grouped[count]) grouped[count] = [];
    grouped[count].push(p);
  });

  let available = [];
  Object.keys(grouped).sort((a,b) => a - b).forEach(k => {
    available.push(...grouped[k].sort(() => Math.random() - 0.5));
  });

  let matches = [];

  for (let i = 1; i <= courts; i++) {
    if (available.length < 4) break;

    let group = available.splice(0, 4);

    let combos = [
      [[group[0], group[1]], [group[2], group[3]]],
      [[group[0], group[2]], [group[1], group[3]]],
      [[group[0], group[3]], [group[1], group[2]]]
    ].sort(() => Math.random() - 0.5);

    let chosen = combos.find(c =>
      !usedPartners.has(key(c[0][0], c[0][1])) &&
      !usedPartners.has(key(c[1][0], c[1][1]))
    ) || combos[0];
